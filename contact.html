<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Poppins&family=Open+Sans&display=swap" rel="stylesheet">

</head>
<body>
    <header>
         <div id="header">
        <img id="logo" src="images/24_india_times.png" alt="24 India Times Logo" height="70" >
        <h3>•● Contact Us ●•</h3>
    </div>
</header>
   
    
    <main>
        <div class="background">
            <div class="contact-box">
        <form>
            
                   <label for="id1">Name</label>
                   <input type="text" placeholder="your name" id="id1" ><br><br>
                   <label for="email">Email</label>
                   <input type="email" id="email" placeholder="Your Email"><br><br>
                   <textarea id="message" placeholder="Your valuable feedback" rows="5"></textarea><br><br>
                   <button type="submit">Send Message</button>
             
           
        </form>
        </div>
    </div>
        
    </main>
    <footer>
        <div class="footer-content">
            <p>Contact us at: +91 1234567890</p>
            <p>Email: info@24indiatimes.com</p>
            <p>© 2024 24 India Times. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
